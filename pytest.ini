[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    preflight: Pre-flight connectivity checks
    bfb: BFB installation tests
    bmc: BMC firmware and management tests
    nic: NIC firmware tests
    uefi: UEFI capsule and boot tests
    functional: Functional validation tests
    stress: Stress and endurance tests
    doca: DOCA runtime tests
    emmc: eMMC storage tests
    p0: Priority 0 - Must pass
    p1: Priority 1 - Should pass
    p2: Priority 2 - Nice to pass
    destructive: Test may alter device state
    slow: Test takes > 5 minutes
    rshim_host: Uses host-side RShim
    rshim_bmc: Uses BMC-side RShim

addopts =
    -v
    --tb=short
    --strict-markers
    --junitxml=results/junit.xml
    --html=results/report.html

log_cli = true
log_cli_level = INFO
log_file = results/test.log
log_file_level = DEBUG
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

timeout = 600
timeout_method = signal
